<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦄 Unicórnio Mágico</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink:   #FF6BB5;
  --pink2:  #FF9DD1;
  --purple: #9B5DE5;
  --purple2:#C77DFF;
  --yellow: #FFE14D;
  --mint:   #00F5D4;
  --white:  #FFFBFF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Fredoka One', 'Comic Sans MS', cursive;
  background: linear-gradient(160deg, #1a0533 0%, #3d0f6e 40%, #6b1fa8 70%, #c2448c 100%);
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ======= BACKGROUND STARS ======= */
#bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d) ease-in-out infinite alternate;
  opacity: 0;
}
@keyframes twinkle {
  0%   { opacity: 0; transform: scale(0.5); }
  100% { opacity: var(--o); transform: scale(1.2); }
}
.float-emoji {
  position: absolute;
  font-size: var(--fs);
  animation: floatUp var(--d) ease-in-out infinite;
  opacity: 0.18;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0.18; }
  50%  { opacity: 0.35; }
  100% { transform: translateY(-120px) rotate(20deg); opacity: 0; }
}

/* ======= SCREENS ======= */
.screen {
  display: none;
  position: fixed; inset: 0; z-index: 10;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
  animation: fadeIn 0.4s ease;
}
.screen.active { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ======= CARD (glass panel) ======= */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 32px;
  padding: 28px 32px;
  width: min(420px, 95vw);
  box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
}

/* ======= WELCOME ======= */
.uni-big {
  font-size: clamp(5em, 20vw, 8em);
  line-height: 1;
  animation: bounce 1.8s ease-in-out infinite;
  filter: drop-shadow(0 6px 16px rgba(255,107,181,0.7));
}
@keyframes bounce {
  0%,100% { transform: translateY(0) rotate(-6deg) scale(1); }
  50%      { transform: translateY(-18px) rotate(6deg) scale(1.07); }
}
.welcome-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.2em, 9vw, 3.8em);
  background: linear-gradient(90deg, #FFE14D, #FF6BB5, #C77DFF, #00F5D4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  line-height: 1.1;
  margin: 12px 0 6px;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}
.welcome-sub {
  color: rgba(255,255,255,0.75);
  font-size: 1.05em;
  text-align: center;
  margin-bottom: 20px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
}
.name-label {
  color: var(--yellow);
  font-size: 1.15em;
  margin-bottom: 8px;
  text-align: center;
  display: block;
}
.name-input {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4em;
  padding: 14px 24px;
  border: 3px solid rgba(255,255,255,0.4);
  border-radius: 50px;
  background: rgba(255,255,255,0.15);
  color: white;
  text-align: center;
  width: 100%;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  letter-spacing: 1px;
}
.name-input::placeholder { color: rgba(255,255,255,0.45); }
.name-input:focus {
  border-color: var(--yellow);
  background: rgba(255,255,255,0.22);
  box-shadow: 0 0 0 4px rgba(255,225,77,0.25);
}
.btn-play {
  font-family: 'Fredoka One', cursive;
  font-size: 1.5em;
  padding: 16px 0;
  width: 100%;
  background: linear-gradient(135deg, #FF6BB5, #9B5DE5);
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 16px;
  letter-spacing: 2px;
  box-shadow: 0 6px 24px rgba(155,93,229,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  transition: transform 0.12s, box-shadow 0.12s;
  position: relative;
  overflow: hidden;
}
.btn-play::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 60%);
  border-radius: 50px;
}
.btn-play:active { transform: scale(0.95); box-shadow: 0 3px 12px rgba(155,93,229,0.4); }

.speed-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 14px; justify-content: center;
  color: rgba(255,255,255,0.7);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85em;
}
.speed-btn {
  padding: 5px 13px;
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 20px;
  background: transparent;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85em;
  transition: all 0.15s;
}
.speed-btn.active {
  background: var(--yellow);
  color: #333;
  border-color: var(--yellow);
}

/* ======= MAP ======= */
.map-hello {
  font-size: clamp(1.6em, 6vw, 2.4em);
  color: white;
  text-align: center;
  margin-bottom: 4px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.map-hello span { color: var(--yellow); }
.stars-bar {
  font-size: 1.6em;
  margin-bottom: 18px;
  letter-spacing: 4px;
  filter: drop-shadow(0 2px 6px rgba(255,225,77,0.6));
}
.phase-card {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 26px;
  padding: 16px 20px;
  width: min(420px, 95vw);
  margin-bottom: 12px;
  backdrop-filter: blur(12px);
}
.phase-label {
  font-size: 1.2em;
  color: var(--yellow);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.scenes-row {
  display: flex; gap: 10px; justify-content: center;
}
.scene-card {
  width: 105px; height: 95px;
  border-radius: 20px;
  border: 2.5px solid rgba(255,255,255,0.2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  position: relative;
  overflow: hidden;
}
.scene-card .s-icon { font-size: 2.4em; line-height: 1; }
.scene-card .s-label {
  font-size: 0.62em;
  color: rgba(255,255,255,0.7);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
}
.scene-card.unlocked {
  background: rgba(255,255,255,0.16);
  border-color: rgba(255,255,255,0.4);
  box-shadow: 0 4px 16px rgba(155,93,229,0.3);
}
.scene-card.unlocked:active { transform: scale(0.93); }
.scene-card.done {
  background: linear-gradient(135deg, rgba(255,107,181,0.35), rgba(155,93,229,0.35));
  border-color: var(--pink2);
  box-shadow: 0 0 18px rgba(255,107,181,0.4);
}
.scene-card.locked { opacity: 0.35; cursor: default; }
.scene-card .check {
  position: absolute; top: 5px; right: 7px;
  font-size: 0.8em;
}

/* ======= COLORING ======= */
#coloring-screen { justify-content: flex-start; padding-top: 8px; gap: 6px; }
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: min(580px, 98vw); padding: 0 4px;
}
.screen-title {
  font-size: clamp(1.1em, 4.5vw, 1.5em);
  color: var(--yellow);
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.btn-back {
  padding: 9px 18px;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50px;
  color: white;
  cursor: pointer;
  font-family: 'Fredoka One', cursive;
  font-size: 0.95em;
  transition: background 0.15s, transform 0.1s;
  backdrop-filter: blur(8px);
}
.btn-back:active { transform: scale(0.93); background: rgba(255,255,255,0.25); }

#coloring-canvas {
  border: 4px solid rgba(255,255,255,0.35);
  border-radius: 20px;
  cursor: crosshair;
  max-width: min(580px, 98vw);
  max-height: 42vh;
  touch-action: none;
  background: white;
  display: block;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.palette-wrap {
  display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: center;
  max-width: min(580px, 98vw);
  padding: 4px 8px;
}
.swatch {
  width: 46px; height: 46px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid rgba(255,255,255,0.2);
  transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  position: relative;
}
.swatch.sel {
  border-color: white;
  transform: scale(1.28);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.5), 0 6px 16px rgba(0,0,0,0.3);
}
.swatch:active { transform: scale(1.1); }

.foot-btns {
  display: flex; gap: 10px; padding-bottom: 8px;
}
.btn-action {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1em;
  padding: 13px 26px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 1px;
}
.btn-action:active { transform: scale(0.94); }
.btn-erase {
  background: rgba(255,255,255,0.18);
  color: white;
  border: 2px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(8px);
}
.btn-done {
  background: linear-gradient(135deg, #00F5D4, #00C9A7);
  color: #1a0533;
  box-shadow: 0 5px 18px rgba(0,245,212,0.4);
}

/* ======= PUZZLE ======= */
#puzzle-screen { justify-content: flex-start; padding-top: 8px; gap: 8px; }
.puzzle-grid {
  display: grid;
  background: rgba(255,255,255,0.15);
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 18px;
  overflow: hidden;
  gap: 3px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.p-slot {
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer;
  transition: background 0.2s;
  position: relative;
}
.p-slot .slot-num {
  font-size: 1.3em;
  color: rgba(255,255,255,0.3);
  pointer-events: none;
}
.p-slot.correct {
  background: rgba(0,245,212,0.15);
  outline: 3px solid rgba(0,245,212,0.6);
  outline-offset: -3px;
}
.p-slot.correct::after {
  content: '⭐';
  position: absolute; top: 3px; right: 4px;
  font-size: 0.75em; pointer-events: none;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }
.p-slot canvas { width: 100%; height: 100%; display: block; }

.hint-text {
  color: rgba(255,255,255,0.7);
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.95em;
  text-align: center;
}
.pieces-area {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center;
  max-width: min(440px, 98vw);
}
.p-piece {
  border: 3px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  overflow: hidden; cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  background: white;
}
.p-piece canvas { display: block; width: 100%; height: 100%; }
.p-piece.sel {
  border-color: var(--yellow);
  box-shadow: 0 0 18px rgba(255,225,77,0.7);
  transform: scale(1.07) translateY(-4px);
}
.p-piece.placed { opacity: 0; pointer-events: none; transition: opacity 0.3s; }

/* ======= CELEBRATION ======= */
#celebration-screen {
  background: radial-gradient(ellipse at center, rgba(155,93,229,0.4) 0%, rgba(26,5,51,0.85) 100%);
  backdrop-filter: blur(6px);
}
.celeb-title {
  font-size: clamp(2em, 9vw, 3.5em);
  text-align: center;
  background: linear-gradient(90deg, #FFE14D, #FF6BB5, #C77DFF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 16px rgba(255,107,181,0.5));
  animation: pulse 0.7s ease-in-out infinite alternate;
}
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
.celeb-icon {
  font-size: clamp(4em, 14vw, 6em);
  margin: 10px 0;
  animation: bounce 1.2s ease-in-out infinite;
  filter: drop-shadow(0 8px 20px rgba(255,107,181,0.6));
}
.celeb-msg {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: clamp(1em, 4vw, 1.35em);
  color: rgba(255,255,255,0.9);
  text-align: center;
  max-width: 320px;
  line-height: 1.5;
  margin: 8px 10px 20px;
}
.btn-continue {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4em;
  padding: 15px 40px;
  background: linear-gradient(135deg, #FF6BB5, #9B5DE5);
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(155,93,229,0.5);
  letter-spacing: 1px;
  transition: transform 0.1s;
}
.btn-continue:active { transform: scale(0.94); }

/* ======= FX ======= */
#fx {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 999; overflow: hidden;
}
.spark {
  position: absolute;
  font-size: clamp(1.2em, 4vw, 2.2em);
  animation: sparkFall var(--dur, 1.8s) ease-in forwards;
  will-change: transform, opacity;
}
@keyframes sparkFall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(110vh) rotate(540deg) scale(0.4); }
}
</style>
</head>
<body>

<!-- BG layer -->
<div id="bg"></div>
<!-- FX layer -->
<div id="fx"></div>

<!-- ============ WELCOME ============ -->
<div id="welcome-screen" class="screen active">
  <div class="uni-big">🦄</div>
  <div class="welcome-title">Unicórnio<br>Mágico!</div>
  <div class="welcome-sub">Um mundo de cores e magia te espera ✨</div>
  <button class="btn-play" onclick="startGame()">🌈 Jogar Agora!</button>
</div>

<!-- ============ MAP ============ -->
<div id="map-screen" class="screen">
  <div class="map-hello">🦄 Escolha uma Aventura! 🦄</div>
  <div class="stars-bar" id="stars-bar"></div>
  <div class="phase-card">
    <div class="phase-label">🎨 Pintar as Cenas</div>
    <div class="scenes-row" id="paint-row"></div>
  </div>
  <div class="phase-card">
    <div class="phase-label">🧩 Quebra-Cabeça</div>
    <div class="scenes-row" id="puzzle-row"></div>
  </div>
</div>

<!-- ============ COLORING ============ -->
<div id="coloring-screen" class="screen">
  <div class="top-bar">
    <button class="btn-back" onclick="goMap()">← Voltar</button>
    <div class="screen-title" id="c-title">🎨 Pinte!</div>
    <div style="width:90px"></div>
  </div>
  <canvas id="coloring-canvas"></canvas>
  <div class="palette-wrap" id="palette"></div>
  <div class="foot-btns">
    <button class="btn-action btn-erase" onclick="setEraser()">🧹 Borracha</button>
    <button class="btn-action btn-done" onclick="finishPainting()">Pronto! ⭐</button>
  </div>
</div>

<!-- ============ PUZZLE ============ -->
<div id="puzzle-screen" class="screen">
  <div class="top-bar">
    <button class="btn-back" onclick="goMap()">← Voltar</button>
    <div class="screen-title" id="p-title">🧩 Monte!</div>
    <div style="width:90px"></div>
  </div>
  <div class="puzzle-grid" id="pgrid"></div>
  <div class="hint-text">👆 Toque uma peça, depois toque onde ela vai!</div>
  <div class="pieces-area" id="ppieces"></div>
</div>

<!-- ============ CELEBRATION ============ -->
<div id="celebration-screen" class="screen">
  <div class="celeb-title" id="celeb-title">🌟 Parabéns!</div>
  <div class="celeb-icon" id="celeb-icon">🦄</div>
  <div class="celeb-msg" id="celeb-msg"></div>
  <button class="btn-continue" onclick="goMap()">Continuar →</button>
</div>

<script>
// =============================================
// CONSTANTS
// =============================================
const IMGS = [
  'https://raw.githubusercontent.com/jonathancojak-audensedu/unicornios/main/UNICORNIO%201.png',
  'https://raw.githubusercontent.com/jonathancojak-audensedu/unicornios/main/UNICORNIO%202.png',
  'https://raw.githubusercontent.com/jonathancojak-audensedu/unicornios/main/UNICORNIO%203.png'
];
const SCENE_NAMES  = ['Cena 1', 'Cena 2', 'Cena 3'];
const SCENE_EMOJIS = ['🌸','🌈','⭐'];
const COLS = 3, ROWS = 2;

const PAINTS = [
  {name:'Rosa',     hex:'#FF6BB5'},
  {name:'Roxo',     hex:'#9B5DE5'},
  {name:'Amarelo',  hex:'#FFE14D'},
  {name:'Azul',     hex:'#4EA8DE'},
  {name:'Verde',    hex:'#2ECC71'},
  {name:'Laranja',  hex:'#FF8C42'},
  {name:'Vermelho', hex:'#E74C3C'},
  {name:'Azul Bebê',hex:'#A8DAFF'},
  {name:'Rosa Bebê',hex:'#FFB6D9'},
  {name:'Lilás',    hex:'#D7B4F3'},
  {name:'Menta',    hex:'#B2F7EF'},
  {name:'Branco',   hex:'#FFFFFF'},
];

const MSG_PAINT  = [
  'Que lindo! A Luna adorou as cores! 🌸',
  'Perfeito! O arco-íris ficou incrível! 🌈',
  'Sensacional! Você é uma artista! ⭐'
];
const MSG_PUZZLE = [
  'Arrasou! O quebra-cabeça ficou perfeito! 🌸',
  'Uau! Você é muito inteligente! 🌈',
  'Incrível! Você completou tudo! ⭐'
];
const ICON_PAINT  = ['🎨','🌈','✨'];
const ICON_PUZZLE = ['🧩','🏆','🦄'];

// =============================================
// STATE
// =============================================
const G = {
  name: '', speed: 0.8, selColor: '#FF6BB5',
  paintDone:  [false,false,false],
  puzzleDone: [false,false,false],
  savedPaint: [null,null,null],
  curScene: 0
};
function save() {
  try { localStorage.setItem('uni2_'+G.name, JSON.stringify({paintDone:G.paintDone,puzzleDone:G.puzzleDone,savedPaint:G.savedPaint})); }
  catch(e){}
}
function load(n) {
  try {
    const d = JSON.parse(localStorage.getItem('uni2_'+n)||'{}');
    if(d.paintDone)  G.paintDone  = d.paintDone;
    if(d.puzzleDone) G.puzzleDone = d.puzzleDone;
    if(d.savedPaint) G.savedPaint = d.savedPaint;
  } catch(e){}
}

// =============================================
// BACKGROUND GENERATION
// =============================================
function buildBg() {
  const bg = document.getElementById('bg');
  // Stars
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=(Math.random()*4+1)+'px';
    s.style.cssText=`width:${sz};height:${sz};left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*3}s;--o:${0.3+Math.random()*0.7};animation-delay:${-Math.random()*4}s`;
    bg.appendChild(s);
  }
  // Floating emojis
  ['🌸','🌟','💜','✨','🌈','💖','🦋','🌺'].forEach((em,i)=>{
    const el=document.createElement('div');
    el.className='float-emoji';
    el.textContent=em;
    const fs=(1.2+Math.random()*1.5)+'em';
    el.style.cssText=`--fs:${fs};--d:${5+Math.random()*7}s;left:${Math.random()*95}%;bottom:${Math.random()*40}%;animation-delay:${-Math.random()*8}s`;
    bg.appendChild(el);
  });
}

// =============================================
// AUDIO
// =============================================
let actx;
function getACtx() {
  if(!actx) actx = new(window.AudioContext||window.webkitAudioContext)();
  return actx;
}
function beep(freq,dur,vol=0.22,type='sine') {
  try {
    const c=getACtx(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value=freq; o.type=type;
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start(); o.stop(c.currentTime+dur);
  }catch(e){}
}
function sfxClick()   { beep(650,0.07,0.12); }
function sfxPaint()   { beep(500+Math.random()*400,0.09,0.1); }
function sfxWrong()   { beep(260,0.28,0.18,'square'); }
function sfxCorrect() { [880,1108,1320,1760].forEach((f,i)=>setTimeout(()=>beep(f,0.2,0.25),i*100)); }
function sfxCeleb()   { [523,659,784,880,1047,1319,1568,2093].forEach((f,i)=>setTimeout(()=>beep(f,0.22,0.28),i*100)); }

// =============================================
// SPEECH
// =============================================
function say(text,delay=0) {
  setTimeout(()=>{
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='pt-BR'; u.rate=G.speed; u.pitch=1.1; u.volume=1;
    // Try to pick a pt-BR voice
    const voices = speechSynthesis.getVoices();
    const ptVoice = voices.find(v=>v.lang.startsWith('pt'))
                 || voices.find(v=>v.lang.startsWith('pt-BR'));
    if(ptVoice) u.voice=ptVoice;
    speechSynthesis.speak(u);
  },delay);
}
function setSpeed(s,btn) {
  G.speed=s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// =============================================
// SCREEN TRANSITIONS
// =============================================
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  el.classList.add('active');
}

// =============================================
// WELCOME
// =============================================
function startGame() {
  sfxCeleb();
  G.name='Jogador'; load(G.name);
  say('Vamos entrar no mundo mágico dos unicórnios!',200);
  setTimeout(goMap,400);
}

// =============================================
// MAP
// =============================================
function goMap() {
  sfxClick();
  const stars = G.paintDone.filter(Boolean).length + G.puzzleDone.filter(Boolean).length;
  document.getElementById('stars-bar').textContent = '⭐'.repeat(stars) + '☆'.repeat(6-stars);
  buildRow('paint-row','painting');
  buildRow('puzzle-row','puzzle');
  show('map-screen');
}
function buildRow(elId, phase) {
  const el=document.getElementById(elId);
  el.innerHTML='';
  for(let i=0;i<3;i++){
    const done    = phase==='painting' ? G.paintDone[i]  : G.puzzleDone[i];
    const unlocked= phase==='painting' ? (i===0||G.paintDone[i-1]) : G.paintDone[i];
    const card=document.createElement('div');
    card.className='scene-card '+(done?'done':unlocked?'unlocked':'locked');
    const icon=done?'✅':unlocked?(phase==='painting'?'🎨':'🧩'):'🔒';
    card.innerHTML=`<span class="s-icon">${icon}</span><span class="s-label">${SCENE_NAMES[i]}</span>`;
    if(done) card.innerHTML+=`<span class="check">⭐</span>`;
    if(unlocked&&!done) card.onclick=()=>{ sfxClick(); phase==='painting'?startPainting(i):startPuzzle(i); };
    el.appendChild(card);
  }
}

// =============================================
// COLORING — FLOOD FILL
// =============================================
let CC, CX;

function startPainting(i) {
  G.curScene=i;
  document.getElementById('c-title').textContent=`🎨 Pinte ${SCENE_NAMES[i]}!`;
  CC=document.getElementById('coloring-canvas');
  CX=CC.getContext('2d',{willReadFrequently:true});

  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    const maxW=Math.min(580,window.innerWidth-16);
    const maxH=Math.floor(window.innerHeight*0.43);
    const scale=Math.min(maxW/img.width, maxH/img.height);
    CC.width=Math.round(img.width*scale);
    CC.height=Math.round(img.height*scale);
    CX.drawImage(img,0,0,CC.width,CC.height);
    if(G.savedPaint[i]){ const ri=new Image(); ri.onload=()=>CX.drawImage(ri,0,0,CC.width,CC.height); ri.src=G.savedPaint[i]; }
  };
  img.onerror=()=>{
    CC.width=480; CC.height=320;
    CX.fillStyle='#FFF'; CX.fillRect(0,0,480,320);
    CX.font='90px serif'; CX.textAlign='center'; CX.textBaseline='middle';
    CX.fillText('🦄',240,140);
    CX.fillStyle='#999'; CX.font='22px sans-serif';
    CX.fillText('Imagem não encontrada',240,240);
  };
  img.src=IMGS[i];
  buildPalette();
  CC.onclick=handlePaintClick;
  CC.ontouchend=e=>{ e.preventDefault(); const t=e.changedTouches[0],r=CC.getBoundingClientRect(); doPaint(Math.round((t.clientX-r.left)*CC.width/r.width),Math.round((t.clientY-r.top)*CC.height/r.height)); };
  say(`Escolha uma cor e pinte ${SCENE_NAMES[i]}! Toque na imagem!`,200);
  show('coloring-screen');
}

function buildPalette() {
  const el=document.getElementById('palette');
  el.innerHTML='';
  PAINTS.forEach(p=>{
    const sw=document.createElement('div');
    sw.className='swatch'+(p.hex===G.selColor?' sel':'');
    sw.style.background=p.hex;
    if(p.hex==='#FFFFFF') sw.style.boxShadow='0 0 0 2px #AAA inset, 0 4px 10px rgba(0,0,0,0.25)';
    sw.title=p.name;
    sw.onclick=()=>{
      document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel'));
      sw.classList.add('sel');
      G.selColor=p.hex; sfxClick(); say(p.name);
    };
    el.appendChild(sw);
  });
}

function setEraser(){ G.selColor='#FFFFFF'; document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel')); sfxClick(); say('Borracha!'); }

function handlePaintClick(e){ const r=CC.getBoundingClientRect(); doPaint(Math.round((e.clientX-r.left)*CC.width/r.width),Math.round((e.clientY-r.top)*CC.height/r.height)); }

function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

function doPaint(sx,sy) {
  if(sx<0||sy<0||sx>=CC.width||sy>=CC.height) return;
  const id=CX.getImageData(0,0,CC.width,CC.height), d=id.data, W=CC.width, H=CC.height;
  const b=(sy*W+sx)*4, tR=d[b], tG=d[b+1], tB=d[b+2];
  if(tR<60&&tG<60&&tB<60) return; // outline
  const [fR,fG,fB]=hexToRgb(G.selColor);
  const TOL=40;
  if(Math.abs(tR-fR)<TOL&&Math.abs(tG-fG)<TOL&&Math.abs(tB-fB)<TOL) return;
  function ok(i){ return Math.abs(d[i]-tR)<=TOL&&Math.abs(d[i+1]-tG)<=TOL&&Math.abs(d[i+2]-tB)<=TOL&&d[i+3]>10; }
  function fill(i){ d[i]=fR;d[i+1]=fG;d[i+2]=fB;d[i+3]=255; }
  const q=new Int32Array(W*H), vis=new Uint8Array(W*H);
  let head=0,tail=0;
  const st=sy*W+sx; q[tail++]=st; vis[st]=1;
  while(head<tail){
    const pos=q[head++], pi=pos*4;
    if(!ok(pi)) continue;
    fill(pi);
    const x=pos%W, y=(pos-x)/W;
    if(x>0&&!vis[pos-1]){vis[pos-1]=1;q[tail++]=pos-1;}
    if(x<W-1&&!vis[pos+1]){vis[pos+1]=1;q[tail++]=pos+1;}
    if(y>0&&!vis[pos-W]){vis[pos-W]=1;q[tail++]=pos-W;}
    if(y<H-1&&!vis[pos+W]){vis[pos+W]=1;q[tail++]=pos+W;}
    if(head>900000) break;
  }
  CX.putImageData(id,0,0); sfxPaint();
}

function finishPainting() {
  G.savedPaint[G.curScene]=CC.toDataURL('image/jpeg',0.88);
  G.paintDone[G.curScene]=true; save();
  celebrate(`🎨 Lindo demais! 🎨`,ICON_PAINT[G.curScene],MSG_PAINT[G.curScene]);
}

// =============================================
// PUZZLE
// =============================================
let PP=[], selPiece=null, placed={}, pW, pH;

function startPuzzle(i) {
  G.curScene=i;
  document.getElementById('p-title').textContent=`🧩 ${SCENE_NAMES[i]}!`;
  PP=[]; selPiece=null; placed={};
  const src=G.savedPaint[i]||IMGS[i];
  const img=new Image(); img.crossOrigin='anonymous';
  img.onload=()=>buildPuzzle(img);
  img.onerror=()=>say('Imagem não carregou!');
  img.src=src;
  say(`Monte o quebra-cabeça da ${SCENE_NAMES[i]}!`,200);
  show('puzzle-screen');
}

function buildPuzzle(img) {
  const maxW=Math.min(420,window.innerWidth-16);
  const imgW=maxW, imgH=Math.round(img.height*imgW/img.width);
  const tmp=document.createElement('canvas'); tmp.width=imgW; tmp.height=imgH;
  tmp.getContext('2d').drawImage(img,0,0,imgW,imgH);
  pW=Math.floor(imgW/COLS); pH=Math.floor(imgH/ROWS);
  const pieces=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const pc=document.createElement('canvas'); pc.width=pW; pc.height=pH;
    pc.getContext('2d').drawImage(tmp,c*pW,r*pH,pW,pH,0,0,pW,pH);
    pieces.push({canvas:pc, correct:r*COLS+c});
  }
  PP=pieces.sort(()=>Math.random()-0.5);

  const grid=document.getElementById('pgrid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${COLS},${pW}px)`;
  for(let s=0;s<ROWS*COLS;s++){
    const slot=document.createElement('div');
    slot.className='p-slot'; slot.style.width=pW+'px'; slot.style.height=pH+'px';
    slot.dataset.slot=s; slot.innerHTML=`<span class="slot-num">${s+1}</span>`;
    slot.onclick=()=>handleSlot(s); grid.appendChild(slot);
  }

  const area=document.getElementById('ppieces'); area.innerHTML='';
  PP.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='p-piece'; el.style.width=pW+'px'; el.style.height=pH+'px'; el.dataset.pi=i;
    const dc=document.createElement('canvas'); dc.width=pW; dc.height=pH;
    dc.getContext('2d').drawImage(p.canvas,0,0); el.appendChild(dc);
    el.onclick=()=>handlePiece(i); area.appendChild(el);
  });
}

function handlePiece(i) {
  sfxClick();
  if(selPiece===i){ selPiece=null; document.querySelectorAll('.p-piece').forEach(e=>e.classList.remove('sel')); return; }
  document.querySelectorAll('.p-piece').forEach(e=>e.classList.remove('sel'));
  selPiece=i;
  const el=document.querySelector(`.p-piece[data-pi="${i}"]`);
  if(el) el.classList.add('sel');
}

function handleSlot(s) {
  if(selPiece===null){ say('Escolha uma peça primeiro!'); return; }
  if(s in placed && PP[placed[s]].correct===s){ say('Esse lugar já está certo!'); selPiece=null; return; }
  const piece=PP[selPiece];
  const isOk=piece.correct===s;
  const slot=document.querySelector(`.p-slot[data-slot="${s}"]`);
  slot.innerHTML='';
  const dc=document.createElement('canvas'); dc.width=pW; dc.height=pH;
  dc.getContext('2d').drawImage(piece.canvas,0,0); slot.appendChild(dc);

  if(isOk){
    placed[s]=selPiece; slot.classList.add('correct');
    const pel=document.querySelector(`.p-piece[data-pi="${selPiece}"]`);
    if(pel) pel.classList.add('placed');
    sfxCorrect(); sparkleAt(slot); say('Isso! Muito bem!');
    const ok=Object.keys(placed).filter(k=>PP[placed[k]].correct===+k).length;
    if(ok===ROWS*COLS) setTimeout(finishPuzzle,700);
  } else {
    sfxWrong();
    slot.style.outline='3px solid #E74C3C';
    setTimeout(()=>{ slot.style.outline=''; slot.innerHTML=`<span class="slot-num">${s+1}</span>`; },650);
    say('Tente outro lugar!');
  }
  selPiece=null;
  document.querySelectorAll('.p-piece').forEach(e=>e.classList.remove('sel'));
}

function finishPuzzle() {
  G.puzzleDone[G.curScene]=true; save();
  celebrate(`🏆 Arrasou! 🏆`,ICON_PUZZLE[G.curScene],MSG_PUZZLE[G.curScene]);
}

// =============================================
// CELEBRATION
// =============================================
function celebrate(title,icon,msg) {
  document.getElementById('celeb-title').textContent=title;
  document.getElementById('celeb-icon').textContent=icon;
  document.getElementById('celeb-msg').textContent=msg;
  sfxCeleb(); rain();
  if(navigator.vibrate) navigator.vibrate([150,80,150,80,300]);
  say(msg,300);
  show('celebration-screen');
  const allDone=G.paintDone.every(Boolean)&&G.puzzleDone.every(Boolean);
  if(allDone) setTimeout(()=>{
    document.getElementById('celeb-title').textContent='🦄 Você Completou Tudo! 🦄';
    document.getElementById('celeb-msg').textContent=`Parabéns, ${G.name}! Você é uma superartista! ⭐⭐⭐`;
    say(`Parabéns ${G.name}! Você completou todos os desafios! Você é incrível!`,400);
    rain(); rain();
  },3200);
}

// =============================================
// FX
// =============================================
const FX=['⭐','✨','🌟','💫','🦄','🌈','💜','💖','🌸','🎀','🌺','💎'];
function rain() {
  const el=document.getElementById('fx');
  for(let i=0;i<28;i++) setTimeout(()=>{
    const s=document.createElement('div'); s.className='spark';
    s.textContent=FX[Math.floor(Math.random()*FX.length)];
    const dur=(1.2+Math.random()*1.4)+'s';
    s.style.cssText=`left:${Math.random()*100}vw;top:${-5+Math.random()*-10}vh;--dur:${dur};animation-duration:${dur}`;
    el.appendChild(s); setTimeout(()=>s.remove(),2800);
  }, i*80);
}
function sparkleAt(ref) {
  const r=ref.getBoundingClientRect(), el=document.getElementById('fx');
  ['⭐','✨','🌟'].forEach((em,k)=>{
    const s=document.createElement('div'); s.className='spark';
    s.textContent=em;
    s.style.cssText=`position:fixed;left:${r.left+r.width/2+(k-1)*28}px;top:${r.top}px;--dur:0.9s;animation-duration:0.9s`;
    el.appendChild(s); setTimeout(()=>s.remove(),1100);
  });
}

buildBg();

if(window.speechSynthesis) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>{}; }
